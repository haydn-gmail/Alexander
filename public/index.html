<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Track your newborn's feeding and elimination patterns">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Baby Tracker</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍼</text></svg>">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
      window.addEventListener('error', (event) => {
        document.body.innerHTML += `<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;width:100%;">${event.message} at ${event.filename}:${event.lineno}</div>`;
      });
      window.addEventListener('unhandledrejection', (event) => {
        document.body.innerHTML += `<div style="position:fixed;top:50px;left:0;z-index:9999;background:darkred;color:white;padding:20px;width:100%;">Unhandled Rejection: ${event.reason}</div>`;
      });
    </script>
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-icon">🍼</div>
            <div class="loading-text">Loading...</div>
        </div>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
